name: Release

on:
  push:
    branches: [master]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.gate.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Open or update the version PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check whether this push bumped the package version
        id: gate
        run: |
          if git diff HEAD^ HEAD -- package.json | grep -q '"version"'; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: version
    if: needs.version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm (trusted publishing)
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
